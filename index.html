<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Subway 2D Realista</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #111;
}
canvas {
    display: block;
    margin: auto;
    background: linear-gradient(#555, #222);
}
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lanes = [
    canvas.width / 4,
    canvas.width / 2,
    canvas.width * 3 / 4
];

let player = {
    lane: 1,
    y: canvas.height - 150,
    width: 40,
    height: 60,
    jumping: false,
    jumpForce: 0
};

let obstacles = [];
let speed = 7;
let gravity = 0.8;
let score = 0;

function spawnObstacle() {
    let lane = Math.floor(Math.random() * 3);
    obstacles.push({
        lane: lane,
        y: -80,
        width: 50,
        height: 80
    });
}

function drawPlayer() {
    ctx.fillStyle = "cyan";
    ctx.fillRect(
        lanes[player.lane] - player.width/2,
        player.y,
        player.width,
        player.height
    );
}

function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Estrada
    ctx.fillStyle = "#333";
    ctx.fillRect(canvas.width/3 - 5, 0, 10, canvas.height);
    ctx.fillRect(canvas.width*2/3 - 5, 0, 10, canvas.height);

    // Pulo
    if (player.jumping) {
        player.y -= player.jumpForce;
        player.jumpForce -= gravity;
        if (player.y >= canvas.height - 150) {
            player.y = canvas.height - 150;
            player.jumping = false;
        }
    }

    drawPlayer();

    ctx.fillStyle = "red";
    obstacles.forEach((obs, index) => {
        obs.y += speed;

        ctx.fillRect(
            lanes[obs.lane] - obs.width/2,
            obs.y,
            obs.width,
            obs.height
        );

        if (
            obs.lane === player.lane &&
            player.y + player.height > obs.y &&
            player.y < obs.y + obs.height
        ) {
            alert("Game Over! Score: " + score);
            location.reload();
        }

        if (obs.y > canvas.height) {
            obstacles.splice(index, 1);
            score++;
        }
    });

    ctx.fillStyle = "white";
    ctx.font = "25px Arial";
    ctx.fillText("Score: " + score, 20, 40);

    speed += 0.002;

    requestAnimationFrame(update);
}

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowLeft" && player.lane > 0)
        player.lane--;
    if (e.key === "ArrowRight" && player.lane < 2)
        player.lane++;
    if (e.key === "ArrowUp" && !player.jumping) {
        player.jumping = true;
        player.jumpForce = 18;
    }
});

document.addEventListener("touchstart", function(e) {
    let touchX = e.touches[0].clientX;
    if (touchX < canvas.width / 3 && player.lane > 0)
        player.lane--;
    else if (touchX > canvas.width * 2/3 && player.lane < 2)
        player.lane++;
    else if (!player.jumping) {
        player.jumping = true;
        player.jumpForce = 18;
    }
});

setInterval(spawnObstacle, 900);
update();
</script>

</body>
</html>

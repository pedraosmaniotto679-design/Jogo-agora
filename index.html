<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cavalo Runner Cartoon 9/10</title>
<style>
body{margin:0;overflow:hidden;font-family:Arial;}
canvas{display:block;}
#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-weight:bold;
text-shadow:2px 2px 4px black;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui">
<div id="score">Pontos: 0</div>
<div id="combo">Combo: 0</div>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let ground=canvas.height-180;

let horse={
x:200,
y:ground,
vy:0,
jumpCount:0,
width:120,
height:80,
dash:0,
shield:0
};

let gravity=1;
let speed=7;
let score=0;
let combo=0;
let obstacles=[];
let trees=[];
let clouds=[];
let cameraShake=0;

// criar árvores
for(let i=0;i<10;i++){
trees.push({x:i*300});
}

// criar nuvens
for(let i=0;i<6;i++){
clouds.push({
x:Math.random()*canvas.width,
y:Math.random()*200,
size:60+Math.random()*60
});
}

function spawnObstacle(){
let type=Math.floor(Math.random()*3);
obstacles.push({
x:canvas.width,
type:type,
width:80,
height: type==2?40:80
});
}

function drawSky(){
let gradient=ctx.createLinearGradient(0,0,0,canvas.height);
gradient.addColorStop(0,"#4facfe");
gradient.addColorStop(1,"#00f2fe");
ctx.fillStyle=gradient;
ctx.fillRect(0,0,canvas.width,canvas.height);

// sol
ctx.beginPath();
ctx.arc(canvas.width-150,100,60,0,Math.PI*2);
ctx.fillStyle="yellow";
ctx.fill();
}

function drawClouds(){
ctx.fillStyle="white";
clouds.forEach(c=>{
c.x-=1;
if(c.x<-100)c.x=canvas.width;
ctx.beginPath();
ctx.arc(c.x,c.y,c.size/2,0,Math.PI*2);
ctx.fill();
});
}

function drawTrees(){
trees.forEach(t=>{
t.x-=speed*0.5;
if(t.x<-100)t.x=canvas.width;
ctx.fillStyle="#2E8B57";
ctx.fillRect(t.x,ground-120,40,120);
ctx.beginPath();
ctx.arc(t.x+20,ground-130,60,0,Math.PI*2);
ctx.fill();
});
}

function drawGround(){
ctx.fillStyle="#228B22";
ctx.fillRect(0,ground+horse.height,canvas.width,canvas.height);
}

function drawHorse(){
let legSwing=Math.sin(Date.now()*0.01)*15;

// sombra
ctx.beginPath();
ctx.ellipse(horse.x+60,ground+horse.height,50,15,0,0,Math.PI*2);
ctx.fillStyle="rgba(0,0,0,0.3)";
ctx.fill();

// corpo
ctx.fillStyle="#A0522D";
ctx.beginPath();
ctx.ellipse(horse.x+60,horse.y+40,60,40,0,0,Math.PI*2);
ctx.fill();

// cabeça
ctx.beginPath();
ctx.ellipse(horse.x+110,horse.y+20,30,25,0,0,Math.PI*2);
ctx.fill();

// olho
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(horse.x+120,horse.y+15,8,0,Math.PI*2);
ctx.fill();
ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(horse.x+122,horse.y+15,4,0,Math.PI*2);
ctx.fill();

// pernas
ctx.fillStyle="#5C3317";
ctx.fillRect(horse.x+30,horse.y+70+legSwing,10,40);
ctx.fillRect(horse.x+70,horse.y+70-legSwing,10,40);

// escudo
if(horse.shield>0){
ctx.strokeStyle="cyan";
ctx.lineWidth=4;
ctx.beginPath();
ctx.arc(horse.x+60,horse.y+40,70,0,Math.PI*2);
ctx.stroke();
}
}

function update(){
ctx.clearRect(0,0,canvas.width,canvas.height);

drawSky();
drawClouds();
drawTrees();
drawGround();

// física
horse.vy+=gravity;
horse.y+=horse.vy;
if(horse.y>=ground){
horse.y=ground;
horse.jumpCount=0;
}

// dash
if(horse.dash>0){
speed=12;
horse.dash--;
}else{
speed=7;
}

// obstáculos
obstacles.forEach((o,i)=>{
o.x-=speed;

if(o.type==0){ // pedra
ctx.fillStyle="gray";
ctx.beginPath();
ctx.arc(o.x,ground+40,40,0,Math.PI*2);
ctx.fill();
}
if(o.type==1){ // cerca
ctx.fillStyle="#8B4513";
ctx.fillRect(o.x,ground,20,80);
ctx.fillRect(o.x+40,ground,20,80);
}
if(o.type==2){ // buraco
ctx.fillStyle="black";
ctx.fillRect(o.x,ground+60,80,40);
}

if(collide(o)){
if(horse.shield>0){
horse.shield=0;
obstacles.splice(i,1);
}else{
alert("Game Over! Pontos: "+score);
location.reload();
}
}else if(o.x<0){
obstacles.splice(i,1);
score++;
combo++;
}
});

// power up escudo
if(Math.random()<0.002){
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.arc(canvas.width-100,ground-100,20,0,Math.PI*2);
ctx.fill();
horse.shield=200;
}

if(combo>0 && combo%5==0){
cameraShake=5;
}

if(cameraShake>0){
ctx.translate(Math.random()*10-5,Math.random()*10-5);
cameraShake--;
}

drawHorse();

document.getElementById("score").innerText="Pontos: "+score;
document.getElementById("combo").innerText="Combo: "+combo;

requestAnimationFrame(update);
}

function collide(o){
return(
horse.x+100>o.x &&
horse.x<o.x+80 &&
horse.y+80>ground
);
}

document.addEventListener("keydown",e=>{
if(e.code==="Space" && horse.jumpCount<2){
horse.vy=-18;
horse.jumpCount++;
}
if(e.code==="ShiftLeft"){
horse.dash=20;
}
});

document.addEventListener("touchstart",()=>{
if(horse.jumpCount<2){
horse.vy=-18;
horse.jumpCount++;
}
});

setInterval(spawnObstacle,1400);

update();
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cavalo Runner ULTRA</title>
<style>
body{
    margin:0;
    overflow:hidden;
    font-family:Arial;
}
canvas{
    display:none;
}
#lobby, #gameOverScreen{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(#4facfe,#00f2fe);
    color:white;
}
button{
    padding:15px 30px;
    font-size:20px;
    margin:10px;
    cursor:pointer;
    border:none;
    border-radius:8px;
}
#gameOverScreen{
    display:none;
    background:rgba(0,0,0,0.8);
}
</style>
</head>
<body>

<div id="lobby">
    <h1>🐎 Cavalo Runner ULTRA</h1>
    <p id="recordText"></p>
    <button onclick="startGame()">Jogar</button>
    <button onclick="showInstructions()">Instruções</button>
</div>

<canvas id="game"></canvas>

<div id="gameOverScreen">
    <h1>Game Over</h1>
    <p id="finalScore"></p>
    <button onclick="restartGame()">Voltar ao Lobby</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let ground = canvas.height - 150;

let horse = {
    x:200,
    y:ground,
    width:100,
    height:60,
    velocityY:0,
    jumping:false
};

let gravity = 1;
let obstacles = [];
let speed = 7;
let score = 0;
let best = localStorage.getItem("bestLobby") || 0;
let gameRunning = false;

document.getElementById("recordText").innerText =
"🏆 Recorde: " + best;

function startGame(){
    document.getElementById("lobby").style.display="none";
    canvas.style.display="block";
    gameRunning = true;
    update();
}

function showInstructions(){
    alert("📱 Toque na tela ou aperte ESPAÇO para pular.\nDesvie dos obstáculos!\nA velocidade aumenta com o tempo.");
}

function spawnObstacle(){
    obstacles.push({
        x:canvas.width,
        y:ground,
        width:50,
        height:70
    });
}

function drawGround(){
    ctx.fillStyle="#228B22";
    ctx.fillRect(0,ground+horse.height,canvas.width,canvas.height);
}

function drawHorse(){
    ctx.fillStyle="#8B4513";
    ctx.fillRect(horse.x,horse.y,horse.width,horse.height);
    ctx.fillRect(horse.x+70,horse.y-20,40,40);
}

function update(){
    if(!gameRunning) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="skyblue";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drawGround();

    horse.velocityY += gravity;
    horse.y += horse.velocityY;

    if(horse.y >= ground){
        horse.y = ground;
        horse.jumping = false;
    }

    drawHorse();

    ctx.fillStyle="darkgreen";
    obstacles.forEach((obs,index)=>{
        obs.x -= speed;
        ctx.fillRect(obs.x,obs.y,obs.width,obs.height);

        if(
            horse.x < obs.x + obs.width &&
            horse.x + horse.width > obs.x &&
            horse.y < obs.y + obs.height &&
            horse.y + horse.height > obs.y
        ){
            endGame();
        }

        if(obs.x + obs.width < 0){
            obstacles.splice(index,1);
            score++;
        }
    });

    ctx.fillStyle="black";
    ctx.font="30px Arial";
    ctx.fillText("Pontos: "+score,20,40);

    speed += 0.002;

    requestAnimationFrame(update);
}

function endGame(){
    gameRunning = false;

    if(score > best){
        best = score;
        localStorage.setItem("bestLobby",best);
    }

    document.getElementById("finalScore").innerText =
    "Pontuação: " + score + " | Recorde: " + best;

    canvas.style.display="none";
    document.getElementById("gameOverScreen").style.display="flex";
}

function restartGame(){
    location.reload();
}

document.addEventListener("keydown", e=>{
    if(e.code==="Space" && !horse.jumping && gameRunning){
        horse.velocityY=-20;
        horse.jumping=true;
    }
});

document.addEventListener("touchstart", ()=>{
    if(!horse.jumping && gameRunning){
        horse.velocityY=-20;
        horse.jumping=true;
    }
});

setInterval(spawnObstacle,1400);
</script>

</body>
</html>
